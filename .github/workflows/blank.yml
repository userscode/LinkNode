name: Build iOS (unsigned IPA)

# Запуск при пуше в основную ветку или вручную
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1-stable
  IOS_PRESET: iOS
  NAME: LinkNode # Имя вашего приложения
  HOMEBREW_NO_AUTO_UPDATE: 1

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      # 1. Получение исходного кода
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true 

      # 2. Загрузка Godot для macOS (headless)
      - name: Download Godot headless
        run: |
          curl -L \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip" \
            -o godot.zip
          unzip -q godot.zip -d godot
          
      # 3. Установка шаблонов экспорта
      # Важно: Шаблоны должны лежать в репозитории по пути export_templates/4.4.1.stable/ios.zip
      - name: Install iOS export template
        run: |
          templates_root="$HOME/Library/Application Support/Godot/export_templates"
          mkdir -p "$templates_root/${GODOT_VERSION/-stable/.stable}"
          cp "export_templates/${GODOT_VERSION/-stable/.stable}/ios.zip" "$templates_root/${GODOT_VERSION/-stable/.stable}/"

      # 4. Экспорт проекта Godot в проект Xcode
      # Убедитесь, что в export_presets.cfg для iOS включены:
      # application/export_project_only=true
      - name: Export to Xcode project
        run: |
          mkdir -p build/ios
          godot/Godot.app/Contents/MacOS/Godot --headless --path . \
            --export-release "${IOS_PRESET}" build/ios/${NAME}.xcodeproj

      # 5. Сборка архива без подписи (Unsigned)
      - name: xcodebuild archive (unsigned)
        run: |
          xcodebuild archive \
            -project build/ios/${NAME}.xcodeproj \
            -scheme "${NAME}" \
            -archivePath build/ios/App.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 6. Создание структуры IPA
      - name: Package IPA
        run: |
          cd build/ios
          mkdir -p Payload
          # Копируем .app файл в папку Payload
          cp -R App.xcarchive/Products/Applications/*.app Payload/
          # Архивируем в .ipa
          zip -r "${NAME}.ipa" Payload
          mv "${NAME}.ipa" ../../

      # 7. Загрузка готового файла в артефакты GitHub
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkNode-iOS-Unsigned
          path: ${{ env.NAME }}.ipa
          retention-days: 14
